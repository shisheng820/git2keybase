name: Sync Repos & Releases to Keybase

on:
  schedule:
    - cron: '0 18 * * *'   # 每天定时运行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # 缓存 Git 仓库目录，极大加快下次备份速度，真正实现增量拉取
      - name: Cache Git Repositories
        uses: actions/cache@v3
        with:
          path: ./*.git
          key: git-repos-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            git-repos-${{ runner.os }}-

      - name: Install Keybase
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -O https://prerelease.keybase.io/keybase_amd64.deb
          sudo dpkg -i keybase_amd64.deb || sudo apt-get install -f -y

      - name: Start Keybase Service & Login
        env:
          KEYBASE_USERNAME: ${{ secrets.KEYBASE_USERNAME }}
          KEYBASE_PAPERKEY: ${{ secrets.KEYBASE_PAPERKEY }}
        run: |
          # 启动后台服务 (剔除容易出错的 FUSE 强挂载，保留必要的 daemon)
          run_keybase -g
          sleep 5
          # 验证并登录
          echo "$KEYBASE_PAPERKEY" | keybase oneshot --username="$KEYBASE_USERNAME"
          keybase status

      - name: Run Backup Script
        env:
          KEYBASE_USERNAME: ${{ secrets.KEYBASE_USERNAME }}
          # 【重要】如果你的 Gist 是私有的，建议在 Secrets 中配置一个带有 `gist` 权限的 PAT_TOKEN 来替换默认的 GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }} 
          # 传入 Gist 的 Raw 链接
          REPOS_GIST_URL: ${{ secrets.REPOS_GIST_URL }}
        run: python scripts/backup.py